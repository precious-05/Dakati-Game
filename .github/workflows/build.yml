name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allows running the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Kivy APK
    runs-on: ubuntu-22.04

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK 17 (Required for Android build tools)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 4: Install Linux System Dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            automake || \
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            automake

      # Step 5: Install Buildozer, Cython, and Virtualenv
      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0.0" virtualenv

      # Step 6: Cache Buildozer Global and Project directories
      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-global-

      - name: Cache Buildozer Project Directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-project-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-project-

      # Step 7: Build Android APK
      - name: Build APK with Buildozer
        run: |
          # Add local pip binaries to PATH in case they are not present
          export PATH=$PATH:$HOME/.local/bin
          # Run buildozer in debug mode
          buildozer android debug

      # Step 8: Upload Compiled APK
      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: DakatiGame-APK
          path: bin/*.apk
          if-no-files-found: error
